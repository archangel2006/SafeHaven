<!DOCTYPE html> 
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Material Donations</title>
    <link rel="icon" href="../../assets/1.HomePage/favicon.ico" type="image/x-icon">
    <link rel="icon" type="image/png" sizes="32x32" href="../../assets/1.HomePage/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="../../assets/1.HomePage/favicon-16x16.png">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link rel="stylesheet" href="../components/navbar.css" />

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet"> <!-- for better typography-->
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
            padding:0;
            background-color: #f4f4f4;
            text-align: center;
            overflow-x: hidden;
        }
         .profile-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .header-logo-box {
            width: 38px;
            height: 38px;
            background: white;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2px;
        }
        .header-logo-box img {
            height: 100%;
            width: auto;
        }
        .header {
            background-color: #5568b8;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        header h1 {
            font-size: 1.2rem;
            font-weight: 500;
            margin: 0;
            flex-grow: 1;
            text-align: center;
        }
        .profile-btn:hover {
            background-color: rgba(255,255,255,0.1);
        }

        .header-title {
            color: white;
            font-size: 22px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        h2{
            margin-top: 24px; 
        }
        .helper-text{
            color:#666;
            font-size:14px;
        }
        .donation-form {
            background: white;
            padding: 32px;
            border-radius: 14px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.18);
            width: 100%;
            max-width: 620px;
            margin: 24px auto;
            text-align: left;
        }
        .row{
            display: flex;
            gap: 18px;
            margin-bottom: 10px;
            max-width: 100%;
            flex-direction: column;
            
        } 
        .field{
            display:flex;
            flex-direction: column;
        } 
        .field-label{
            display: block;
            font-family:sans-serif;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
            color: #333;
        }
        label,.field-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 16px;
        }
        .quantity-wrapper{
            position: relative;
        }
        .quantity-wrapper input{
            width: 100%;
            padding-right: 40px;
        }
        .quantity-wrapper span{
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            color: #555;
        }
        .radio-group{
            display: flex;
            gap: 20px;
           justify-content: space-between;
        }
        .radio-option{
           display:inline-flex; 
            align-items:center;
            gap: 8px;
            cursor: pointer; 
            font-size: 16px;
            font-family:'Poppins', sans-serif;
            color: #333;
        }
        .radio-option input{
            transform:scale(1.2);
            width: auto;
            margin :0;
        }
        .location-row{
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        input[type="radio"] {
            accent-color:green;
        }
        .location-row input{
            flex: 1;
        }
        input, select {
           width: 100%;
            padding: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 18px;
        }
        input:focus,select:focus{
            outline: none;
            border-color: #28a745;
            box-shadow: 0 0 0 2px rgba(40,167,69,0.2)
        }
        .submit-btn {
            width: 100%;
            padding: 18px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            font-size: 19px;
            color: white;
            background-color:gray;
            border-radius: 8px;
            font-weight: bold;
            cursor: not-allowed;
            transition: 0.3s;
        }
        .submit-btn.active {
            background-color: #28a745;
            cursor: pointer; 
        }
        .last-line{
            margin-top: 20px;
            line-height: 1.4;
            text-align:center;
            color: #777;
        }
        @media (min-width:600px) {
            .row{
                flex-direction: column;
                gap: 14px;
            }
            .hero h1 {
            font-size: 2rem;
            }

            .hero p {
            font-size: 1rem;
            padding: 0 10px;
            }
            .donation-form {
            max-width: 520px;
            padding: 24px;
            }
        }
        @media (min-width:1440px){
            .hero h1 {
            font-size: 2.5rem;
            }

            .hero p {
            font-size: 1.1rem;
            }

            .donation-form {
            max-width: 640px;
            padding: 30px;
            }
        }

    </style>
</head>
<body>
     <!-- Header -->
     <header class="header">
        <div class="header-logo-box">
            <img src="donation_assets/LOGO.jpg" alt="Safe Haven Logo">
        </div>
        <h1 class="header-title">Material Donations</h1>
        <button class="profile-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <circle cx="12" cy="10" r="3"/>
                <path d="M7 20.662V19a2 2 0 0 1 2-2h6a2 2 0 0 1 2 2v1.662"/>
            </svg>
        </button>
        <i class="fas fa-bars" style="color:white"></i>
    </header>
    <!--Main Content-->
    <h2> 📦 Material Donation </h2> </br>
    <p class="helper-text">Help us deliver the right supplies</p>   
    <form class="donation-form" onsubmit="handleSubmit(event)">
        <div class="row">
            <div class="field">
                <label for="donationType" class="field-label">1.What are you donating?</label>
                <select id="donationType" required onchange="validateForm()">
                <option value="" disabled selected >Select Donation Type</option>
                <option>Food</option>
                <option>Clothes</option>
                <option>Medical Kits</option>
                </select>
            </div>
            <div class="field">
                <label class="field-label">2.Quantity</label>
                <p class="helper-text">
                    Enter approximate quantity available for donation .
                </p></br>
                <div class="quantity-wrapper"  >
                    <input type="number" id="Quantity" placeholder="Enter Quantity" required oninput="validateForm()" min="1">
                    <span id="helper">kg</span>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="field">
                <label class="field-label">3.Condition</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="Condition" value="New" oninput="validateForm()">
                        New
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="Condition" value="Gently Used" oninput="validateForm()">
                        Gently Used
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="Condition" value="Expiry Date" oninput="validateForm()">
                        Expiry Date</br>
                        (For medicines)
                    </label>
                </div>
            </div>
        </div>
        <div class="row">
            <label class="field-label">4.Location</label>
        </div>
        <div class="row location-row">
            <input type="text" placeholder="City" id="city" oninput="validateForm()">
            <input type="text" placeholder="Pincode" id="pincode" oninput="validateForm()"  maxlength="6" required>
        </div>
        <div class="row">
            <div class="field-full-width">
                <label class="field-label">5.Pickup or Drop-off</label>
                <div class="radio-group">
                    <label class="radio-option">
                         <input type="radio" name="Delivery" value="Drop" required oninput="validateForm()">
                             I can drop it off
                    </label>

                    <label class="radio-option">
                        <input type="radio" name="Delivery" value="Pickup" oninput="validateForm()">
                        Pickup required
                    </label>
                </div>
            </div>
        </div>
        <p id="errorMsg"
            style="color:red;font-size:14px;margin-top:10px;">
        </p>
        <button type="submit" class="submit-btn" id="submitBtn" disabled>Submit Donation Details</button>
        <div class="last-line">
            <p>We accept unopened,quality items only. we'll contact you for pickup/drop details.</p>
        </div>
    </form>
<script>
    donationType.addEventListener("change", () => {

    switch(donationType.value){

        case "Medical Kits":
            helper.textContent = "kits";
            break;

        case "Food":
            helper.textContent = "kg";
            break;

        case "Clothes":
            helper.textContent = "pieces";
            break;

        default:
            helper.textContent = "kg";
    }

});
Quantity.addEventListener("input", () => {

    if(Quantity.value < 0){
        Quantity.value = "";
        alert("Negative values are not allowed");
    }

});
 city.addEventListener("input", () => {

   if(/[^a-zA-Z\s]/g.test(city.value)) {
        alert("Special characters and numbers are not allowed");
        city.value = city.value.replace(/[^a-zA-Z\s]/g,'');  
    }
    
    

});
 pincode.addEventListener("input", () => {
    pincode.value = pincode.value.replace(/\D/g, "");

    if(pincode.value.length > 6){
        pincode.value = pincode.value.slice(0,6);
    }
});
    function validateForm() {
        const donationType = document.getElementById("donationType").value;
        const helper =document.getElementById("helper");
        const Quantity = document.getElementById("Quantity").value.trim();
        const City = document.getElementById("city").value.trim();
        const Pincode = document.getElementById("pincode").value.trim();
        const condition = document.querySelector('input[name="Condition"]:checked');
        const Delivery = document.querySelector('input[name="Delivery"]:checked');
        const submitBtn=document.getElementById("submitBtn");
        if (donationType && Quantity && City && Pincode && condition && Delivery) {
            submitBtn.classList.add("active");
            submitBtn.disabled = false;
        } else {
            submitBtn.classList.remove("active");
            submitBtn.disabled = true;
        }
    }

    function handleSubmit(event) {
    event.preventDefault();
    alert("You'll receive an SMS regarding the details of donation. Thank you for your contribution! 🤗💐");
    event.target.reset();
    document.getElementById("submitBtn").disabled = true;
    document.getElementById("submitBtn").classList.remove("active");
}
</script>
<script src="../8.AIAssistant/chatbot.js"></script>

</body>
</html>
